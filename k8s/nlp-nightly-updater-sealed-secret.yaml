# SealedSecret for the nightly updater's OpenAI API key.
#
# To generate this file:
#
#   1. Install kubeseal if not already present:
#        brew install kubeseal       # macOS
#        # or fetch the binary from https://github.com/bitnami-labs/sealed-secrets/releases
#
#   2. Fetch the cluster's public certificate:
#        kubeseal --fetch-cert \
#          --controller-name=sealed-secrets \
#          --controller-namespace=kube-system \
#          > pub-sealed-secrets.pem
#
#   3. Create a plain Secret manifest (DO NOT COMMIT THIS FILE):
#        kubectl create secret generic tarp-updater-secrets \
#          --namespace csearch-nlp \
#          --from-literal=openai-api-key="sk-proj-..." \
#          --dry-run=client -o yaml > /tmp/tarp-secret.yaml
#
#   4. Seal it:
#        kubeseal \
#          --cert pub-sealed-secrets.pem \
#          --format yaml \
#          < /tmp/tarp-secret.yaml \
#          > k8s/nlp-nightly-updater-sealed-secret.yaml
#
#   5. Delete the plain manifest:
#        rm /tmp/tarp-secret.yaml
#
#   6. Apply the SealedSecret (safe to commit and apply):
#        kubectl apply -f k8s/nlp-nightly-updater-sealed-secret.yaml
#
# The Sealed Secrets controller will decrypt this and create a regular
# Secret named `tarp-updater-secrets` in the csearch-nlp namespace.
#
# The placeholder below is intentionally invalid — replace it by following
# the steps above.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: tarp-updater-secrets
  namespace: csearch-nlp
spec:
  encryptedData:
    openai-api-key: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: tarp-updater-secrets
      namespace: csearch-nlp
    type: Opaque
