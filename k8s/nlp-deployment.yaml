apiVersion: apps/v1
kind: Deployment
metadata:
  name: csearch-nlp-api
  namespace: csearch-nlp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csearch-nlp-api
  template:
    metadata:
      labels:
        app: csearch-nlp-api
    spec:
      nodeSelector:
        node: worker1
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: api
          image: 10.0.0.3:30252/csearch-nlp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: csearch-nlp-config
          env:
            - name: PG_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: csearch-nlp-secrets
                  key: pg-connection-string
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: csearch-nlp-secrets
                  key: embedding-api-key
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: csearch-nlp-secrets
                  key: llm-api-key
          volumeMounts:
            - name: fulltext-cache
              mountPath: /data/fulltext
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: fulltext-cache
          persistentVolumeClaim:
            claimName: nlp-fulltext-pvc
