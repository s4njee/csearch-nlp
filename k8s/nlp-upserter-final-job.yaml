apiVersion: batch/v1
kind: Job
metadata:
  name: csearch-nlp-upserter-final
  namespace: csearch-nlp
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: freya
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: upserter
          image: docker.io/library/csearch-upserter:latest
          imagePullPolicy: Never
          args:
            - "--index-only"
            # maintenance_work_mem is charged to the Postgres pod (3Gi limit),
            # not this Job — 10GB there would OOM the index build. Keep it under
            # the DB pod's limit; pgvector falls back to an on-disk build if the
            # HNSW graph doesn't fit, so this only slows the rebuild, not breaks it.
            - "--maintenance-work-mem"
            - "1GB"
            - "--max-parallel-maintenance-workers"
            - "1"
          env:
            - name: PG_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: csearch-nlp-secrets
                  key: pg-connection-string
          volumeMounts:
            - name: embedded-chunks
              mountPath: /home/sanjee/nlp/embedded_chunks
              readOnly: true
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1"
      volumes:
        - name: embedded-chunks
          hostPath:
            path: /home/sanjee/nlp/embedded_chunks
            type: Directory
      restartPolicy: Never
