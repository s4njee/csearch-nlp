apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: csearch-nlp
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      nodeSelector:
        kubernetes.io/hostname: freya
      initContainers:
        - name: init-qdrant-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /qdrant/storage/snapshots && chown -R 1000:1000 /qdrant/storage
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.1
          ports:
            - name: rest
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "1.5Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
            - name: QDRANT__STORAGE__SNAPSHOTS_PATH
              value: "/qdrant/storage/snapshots"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-pvc
